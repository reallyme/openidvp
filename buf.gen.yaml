version: v2
plugins:
  - local: protoc-gen-buffa
    out: crates/proto/openid4vp/src/generated/buffa
    opt: [views=true, json=true]
  - local: protoc-gen-buffa-packaging
    out: crates/proto/openid4vp/src/generated/buffa
    strategy: all
  - local: protoc-gen-connect-rust
    out: crates/proto/openid4vp/src/generated/connect
    opt: [buffa_module=crate::generated::proto]
  - local: protoc-gen-buffa-packaging
    out: crates/proto/openid4vp/src/generated/connect
    strategy: all
    opt: [filter=services]
